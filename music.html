<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mika's Music Archive</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header></header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <img src="profile.jpg" class="profile" alt="Profile">

    <h3>About Me</h3>
    <p>
      Name: Mika<br>
      Favorite music: Metal & emo<br>
      Mood: listening to music
    </p>

    <h3>Navigation</h3>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="music.html">Music Archive</a></li>
      <li><a href="games.html">Favorite Games</a></li>
      <li><a href="links.html">Links</a></li>
    </ul>
  </div>

  <!-- MIDDLE CONTENT -->
  <div class="content">

    <!-- FILTER DROPDOWNS -->
    <div class="filters">
      <label for="genre">Genre:</label>
      <select id="genre">
        <option value="all">All</option>
        <option value="metal">Metal</option>
        <option value="emo">Emo</option>
        <option value="punk">Punk</option>
      </select>

      <label for="platform">Platform:</label>
      <select id="platform">
        <option value="all">All</option>
        <option value="spotify">Spotify</option>
        <option value="youtube">YouTube</option>
        <option value="bandcamp">Bandcamp</option>
      </select>
    </div>

    <!-- MUSIC GRID -->
    <div id="music-grid">

      <!-- MUSIC ITEM 1 -->
      <div class="music-item" data-genre="metal" data-platform="spotify">
        <div class="music-box">
          <div class="embed-container">
            <iframe src="https://open.spotify.com/embed/album/PLACEHOLDER" allow="encrypted-media"></iframe>
          </div>
          <div class="music-info">
            <p>Deftones — Around the Fur</p>
            <div class="music-link">
              <a href="https://open.spotify.com/album/PLACEHOLDER" target="_blank">
                <img src="spotify.png" alt="Spotify">
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- MUSIC ITEM 2 -->
      <div class="music-item" data-genre="emo" data-platform="youtube">
        <div class="music-box">
          <div class="embed-container">
            <iframe src="https://www.youtube.com/embed/PLACEHOLDER" allowfullscreen></iframe>
          </div>
          <div class="music-info">
            <p>Title Fight — Floral Green</p>
            <div class="music-link">
              <a href="https://www.youtube.com/watch?v=PLACEHOLDER" target="_blank">
                <img src="youtube.png" alt="YouTube">
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- MUSIC ITEM 3 -->
      <div class="music-item" data-genre="emo" data-platform="spotify">
        <div class="music-box">
          <div class="embed-container">
            <iframe src="https://open.spotify.com/embed/album/PLACEHOLDER" allow="encrypted-media"></iframe>
          </div>
          <div class="music-info">
            <p>Saosin — Translating the Name</p>
            <div class="music-link">
              <a href="https://open.spotify.com/album/PLACEHOLDER" target="_blank">
                <img src="spotify.png" alt="Spotify">
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Add more music items here -->

    </div>
  </div>

</div>

<footer>
  <p>Personal site • Best viewed on a desktop</p>
</footer>

<script>
  const genreSelect = document.getElementById('genre');
  const platformSelect = document.getElementById('platform');
  const items = document.querySelectorAll('.music-item');

  function filterMusic() {
    const genre = genreSelect.value;
    const platform = platformSelect.value;

    items.forEach(item => {
      const matchGenre = (genre === 'all' || item.dataset.genre === genre);
      const matchPlatform = (platform === 'all' || item.dataset.platform === platform);
      item.style.display = (matchGenre && matchPlatform) ? 'block' : 'none';
    });
  }

  genreSelect.addEventListener('change', filterMusic);
  platformSelect.addEventListener('change', filterMusic);
</script>

</body>
</html>
