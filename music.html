<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mika's Music Archive</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header></header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <img src="profile.jpg" class="profile" alt="Profile">
    
    <h3>About Me</h3>
    <p>
      Name: Mika<br>
      Favorite music: Metal & emo<br>
      Mood: listening to music
    </p>

    <h3>Navigation</h3>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="music.html">Music Archive</a></li>
      <li><a href="games.html">Favorite Games</a></li>
      <li><a href="links.html">Links</a></li>
    </ul>
  </div>

  <!-- MIDDLE CONTENT -->
  <div class="content">
    <div class="box">
      <h2>Music Archive</h2>

      <!-- Filters -->
      <div class="filters">
        <label for="genre">Genre:</label>
        <select id="genre">
          <option value="all">All</option>
          <option value="metal">Metal</option>
          <option value="emo">Emo</option>
          <option value="rock">Rock</option>
        </select>

        <label for="platform">Platform:</label>
        <select id="platform">
          <option value="all">All</option>
          <option value="spotify">Spotify</option>
          <option value="youtube">YouTube</option>
          <option value="bandcamp">Bandcamp</option>
        </select>
      </div>

      <!-- Music Items Grid -->
      <div id="music-grid">

        <!-- Example Music Item -->
        <div class="music-item" data-genre="metal" data-platform="spotify">
          <div class="music-box">
            <div class="embed-container">
              <iframe src="https://open.spotify.com/embed/album/placeholder" frameborder="0" allow="encrypted-media"></iframe>
            </div>
            <div class="music-info">
              <p><strong>Album Title</strong> — Artist Name</p>
              <a href="https://open.spotify.com/album/placeholder" target="_blank" class="music-link">
                <img src="spotify-logo.png" alt="Spotify Logo">
              </a>
            </div>
          </div>
        </div>

        <div class="music-item" data-genre="emo" data-platform="youtube">
          <div class="music-box">
            <div class="embed-container">
              <iframe src="https://www.youtube.com/embed/placeholder" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="music-info">
              <p><strong>Song Title</strong> — Artist Name</p>
              <a href="https://www.youtube.com/watch?v=placeholder" target="_blank" class="music-link">
                <img src="youtube-logo.png" alt="YouTube Logo">
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="right-panel">
    <div class="music-player">
      <h3>Now Playing</h3>
      <audio controls>
        <source src="song.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="gif-area">
      <img src="gif1.gif" alt="gif" class="gif">
      <img src="gif2.gif" alt="gif" class="gif">
    </div>
  </div>

</div>

<footer>
  <p>Personal site • Best viewed on a desktop</p>
</footer>

<script>
  // Filtering functionality
  const genreSelect = document.getElementById('genre');
  const platformSelect = document.getElementById('platform');
  const musicItems = document.querySelectorAll('.music-item');

  function filterMusic() {
    const selectedGenre = genreSelect.value;
    const selectedPlatform = platformSelect.value;

    musicItems.forEach(item => {
      const itemGenre = item.getAttribute('data-genre');
      const itemPlatform = item.getAttribute('data-platform');

      const genreMatch = (selectedGenre === 'all' || selectedGenre === itemGenre);
      const platformMatch = (selectedPlatform === 'all' || selectedPlatform === itemPlatform);

      item.style.display = (genreMatch && platformMatch) ? 'inline-block' : 'none';
    });
  }

  genreSelect.addEventListener('change', filterMusic);
  platformSelect.addEventListener('change', filterMusic);
</script>

</body>
</html>
