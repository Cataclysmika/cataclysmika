<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mika's Music Archive</title>
<link rel="stylesheet" href="music-style.css">
</head>

<body>

<header class="banner-container">
  <img src="banner1.jpg" alt="Banner1" class="banner1">
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <img src="profile.jpg" class="profile" alt="Profile">
    
    <h3>About Me</h3>
    <p>
      Name: Mika<br>
      Favorite music: Metal & emo<br>
      Mood: listening to music
    </p>

    <h3>Navigation</h3>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="music.html">Music Archive</a></li>
      <li><a href="games.html">Favorite Games</a></li>
      <li><a href="links.html">Links</a></li>
    </ul>
  </div>

  <!-- MIDDLE CONTENT -->
  <div class="content">
    <div class="filters">
      <select id="genre-select">
        <option value="all">All Genres</option>
        <option value="metal">Metal</option>
        <option value="emo">Emo</option>
        <option value="punk">Punk</option>
      </select>

      <select id="platform-select">
        <option value="all">All Platforms</option>
        <option value="spotify">Spotify</option>
        <option value="youtube">YouTube</option>
        <option value="bandcamp">Bandcamp</option>
      </select>
    </div>

    <div class="music-grid">

      <!-- Example Music Card -->
      <div class="music-card" data-genre="metal" data-platform="spotify">
        <div class="embed-container">
          <iframe src="https://open.spotify.com/embed/album/ALBUM_ID" frameborder="0" allow="encrypted-media"></iframe>
        </div>
        <div class="track-info">
          <p>Album Name — Artist</p>
        </div>
        <div class="platform-icon">
          <a href="https://open.spotify.com/album/ALBUM_ID" target="_blank">
            <img src="spotify-logo.png" alt="Spotify Logo">
          </a>
        </div>
      </div>

      <div class="music-card" data-genre="emo" data-platform="youtube">
        <div class="embed-container">
          <iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="track-info">
          <p>Song Name — Artist</p>
        </div>
        <div class="platform-icon">
          <a href="https://www.youtube.com/watch?v=VIDEO_ID" target="_blank">
            <img src="youtube-logo.png" alt="YouTube Logo">
          </a>
        </div>
      </div>

      <!-- Add more cards as needed -->
    </div>
  </div>

</div>

<footer>
  <p>Personal site • Best viewed on a desktop</p>
</footer>

<script>
  // Filter logic
  const genreSelect = document.getElementById('genre-select');
  const platformSelect = document.getElementById('platform-select');
  const cards = document.querySelectorAll('.music-card');

  function filterCards() {
    const genre = genreSelect.value;
    const platform = platformSelect.value;

    cards.forEach(card => {
      const cardGenre = card.getAttribute('data-genre');
      const cardPlatform = card.getAttribute('data-platform');

      const show = (genre === 'all' || cardGenre === genre) &&
                   (platform === 'all' || cardPlatform === platform);

      card.style.display = show ? 'block' : 'none';
    });
  }

  genreSelect.addEventListener('change', filterCards);
  platformSelect.addEventListener('change', filterCards);
</script>

</body>
</html>
